<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1050" width="100%" height="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
    
    <style>
      .bg { fill: #f8f9fa; }
      .box { rx: 8px; ry: 8px; stroke-width: 2px; }
      
      /* Cores das Categorias */
      .webhook { fill: #4b4b4b; stroke: #333333; }
      .logic { fill: #41337A; stroke: #261D47; }
      .redis { fill: #104473; stroke: #082239; }
      .tool { fill: #145A46; stroke: #0A2D23; }
      .model { fill: #6F331A; stroke: #3E1D0F; }
      
      /* Tipografia */
      .title { fill: #ffffff; font-family: 'Segoe UI', Arial, sans-serif; font-size: 15px; text-anchor: middle; font-weight: bold; }
      .sub { fill: #d1d5db; font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; text-anchor: middle; }
      .label { fill: #6b7280; font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; font-weight: bold; background: white;}
      
      /* Linhas */
      .line { stroke: #888888; stroke-width: 2px; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #aaaaaa; stroke-width: 2px; fill: none; stroke-dasharray: 6,6; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <path class="line" d="M 400 110 L 400 140" />
  <path class="line" d="M 400 210 L 400 240" />
  <path class="line" d="M 400 310 L 400 340" />
  <path class="line" d="M 400 410 L 400 450" />
  <path class="line" d="M 400 530 L 400 700" /> <path class="line" d="M 400 770 L 400 800" />
  <path class="line" d="M 400 870 L 400 900" />

  <path class="dash" d="M 320 530 C 250 560, 160 560, 160 580" />
  <path class="dash" d="M 400 530 L 400 580" />
  <path class="dash" d="M 480 530 C 550 560, 640 560, 640 580" />

  <path class="dash" d="M 520 375 L 750 375 L 750 835 L 520 835" />

  <g transform="translate(280, 50)">
    <rect class="box webhook" width="240" height="60" />
    <text x="120" y="25" class="title">Webhook — POST /chat</text>
    <text x="120" y="45" class="sub">session_id, user_id, path, msg</text>
  </g>

  <g transform="translate(280, 150)">
    <rect class="box logic" width="240" height="60" />
    <text x="120" y="35" class="title">Normalize &amp; Validate Input</text>
  </g>

  <g transform="translate(280, 250)">
    <rect class="box redis" width="240" height="60" />
    <text x="120" y="25" class="title">Cache path — Redis GET</text>
    <text x="120" y="45" class="sub">Verifica resposta pré-salva</text>
  </g>

  <g transform="translate(280, 350)">
    <rect class="box logic" width="240" height="60" />
    <text x="120" y="25" class="title">IF — same path?</text>
    <text x="120" y="45" class="sub">cache existe → true / false</text>
  </g>
  <text x="560" y="365" class="label">true (cache hit)</text>
  <text x="420" y="435" class="label">false</text>

  <g transform="translate(250, 450)">
    <rect class="box logic" width="300" height="80" />
    <text x="150" y="30" class="title">Agent Search</text>
    <text x="150" y="50" class="sub">Groq Llama 3.3 70B</text>
    <text x="150" y="68" class="sub">Decide tools e estrutura dados</text>
  </g>

  <g transform="translate(40, 590)">
    <rect class="box tool" width="220" height="60" />
    <text x="110" y="25" class="title">Tavily Search</text>
    <text x="110" y="45" class="sub">Busca web — 10 domínios</text>
  </g>

  <g transform="translate(290, 590)">
    <rect class="box tool" width="220" height="60" />
    <text x="110" y="25" class="title">MediaStack API</text>
    <text x="110" y="45" class="sub">Notícias jornalísticas recentes</text>
  </g>

  <g transform="translate(540, 590)">
    <rect class="box tool" width="220" height="60" />
    <text x="110" y="25" class="title">GNews API</text>
    <text x="110" y="45" class="sub">Trends e Projetos de IA</text>
  </g>

  <g transform="translate(250, 700)">
    <rect class="box logic" width="300" height="70" />
    <text x="150" y="25" class="title">Editorial Editor</text>
    <text x="150" y="45" class="sub">Groq Llama 4 Scout 17B</text>
    <text x="150" y="60" class="sub">Gera resposta final com contexto</text>
  </g>

  <g transform="translate(280, 800)">
    <rect class="box redis" width="240" height="70" />
    <text x="120" y="25" class="title">Redis — SET Cache</text>
    <text x="120" y="45" class="sub">Salva Resposta (TTL 3600s)</text>
    <text x="120" y="60" class="sub">Salva Contexto para Followup</text>
  </g>

  <g transform="translate(280, 900)">
    <rect class="box webhook" width="240" height="60" />
    <text x="120" y="35" class="title">Respond to Webhook</text>
  </g>

</svg>
